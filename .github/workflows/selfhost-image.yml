# Build the self-host image and publish it to GHCR.
#
# This lives in the PUBLIC `RelicSync/server` repo (assembled by
# publish/export.sh). It smoke-tests the self-host build, then builds a
# multi-arch image (amd64 + arm64, so Raspberry Pi / ARM NAS work) and pushes it
# to ghcr.io/<owner>/relic-selfhost. No secrets to configure: it uses the
# built-in GITHUB_TOKEN.
name: self-host image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: selfhost-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Drift guard: the whole point of the self-host build is that it runs the
  # UNCHANGED worker via local adapters. This proves the adapters still satisfy
  # the worker before we ship an image.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps at the repo root
        # Mirror the Dockerfile: install from the self-host manifest at the ROOT
        # so both worker/ (imports jose) and selfhost/ (imports better-sqlite3)
        # resolve node_modules. Installing inside selfhost/ hides jose from the
        # sibling worker/ directory.
        run: cp selfhost/package.json package.json && npm install --no-audit --no-fund
      - name: In-process smoke test (full sync data plane)
        working-directory: selfhost
        run: npm run smoke

  image:
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name for GHCR automatically.
          images: ghcr.io/${{ github.repository_owner }}/relic-selfhost
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: selfhost/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
